<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KrolekVPNReborn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main: #ff6b35; --grad: linear-gradient(135deg, #ff6b35, #ff9f4a); }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 400px; background: #151515; border-radius: 30px; padding: 25px; border: 1px solid rgba(255,107,53,0.2); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .logo { font-size: 22px; font-weight: 800; margin-bottom: 25px; color: var(--main); }
        .rabbit-icon { font-size: 50px; margin-bottom: 10px; }
        .expire-date { font-size: 28px; font-weight: 800; color: #fff; margin: 15px 0; }
        .stats { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; margin: 20px 0; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .row:last-child { border: none; }
        .label { color: #888; font-size: 14px; }
        .val { font-weight: 600; color: #ff9f4a; }
        .btn { background: var(--grad); border: none; padding: 18px; border-radius: 50px; color: #fff; font-weight: 700; font-size: 16px; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); }
        .notif { position: fixed; bottom: 20px; background: #222; padding: 15px 25px; border-radius: 15px; border-left: 4px solid var(--main); display: none; z-index: 100; animation: up 0.3s; }
        @keyframes up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .spin { width: 18px; height: 18px; border: 2px solid #fff3; border-top: 2px solid #fff; border-radius: 50%; animation: s 1s linear infinite; display: inline-block; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">KrolekVPN<span style="color:#fff">Reborn</span></div>
        <div class="rabbit-icon">🐇</div>
        <div class="expire-date" id="exp">Загрузка...</div>
        
        <div class="stats">
            <div class="row"><span class="label">Дней осталось</span><span class="val" id="days">0</span></div>
            <div class="row"><span class="label">Запас морковок</span><span class="val" id="crts">5</span></div>
            <div class="row"><span class="label">Статус</span><span class="val" id="st">Обновление...</span></div>
        </div>

        <button class="btn" id="btn" onclick="feed()">
            <i class="fas fa-carrot"></i> Покормить (+7 дней)
        </button>
    </div>

    <div class="notif" id="n"></div>

    <script>
        const FILE = "https://raw.githubusercontent.com/kangaroo255075-collab/KrolekVPNReborn-Reborn-/refs/heads/main/Krolek.txt";
        const tg = window.Telegram?.WebApp;
        let ts = 0, c = 5, busy = false;

        function render() {
            if (!ts) return;
            let time = ts < 1e11 ? ts * 1000 : ts;
            const d = new Date(time);
            document.getElementById('exp').innerText = d.toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
            
            const diff = Math.max(0, Math.ceil((time - Date.now()) / 864e5));
            document.getElementById('days').innerText = diff;
            document.getElementById('crts').innerText = c;
            
            const s = document.getElementById('st');
            s.innerText = diff > 0 ? "🟢 АКТИВНА" : "🔴 ПРОСРОЧЕНА";
            s.style.color = diff > 0 ? "#4caf50" : "#ff4b4b";
            document.getElementById('btn').disabled = c < 1 || busy;
        }

        async function load() {
            try {
                const r = await fetch(`${FILE}?v=${Date.now()}`);
                const txt = await r.text();
                const m = txt.match(/expire=(\d+)/);
                if (m) ts = parseInt(m[1]);
                render();
            } catch (e) { document.getElementById('exp').innerText = "Ошибка сети"; }
        }

        function feed() {
            if (c < 1 || busy) return;
            busy = true;
            const b = document.getElementById('btn');
            b.innerHTML = '<span class="spin"></span> Хрум...';
            
            ts += 604800; // +7 дней
            c--;
            render();

            if (tg?.sendData) {
                tg.sendData(JSON.stringify({action: "feed", new_expire: ts, user_id: tg.initDataUnsafe?.user?.id}));
            }
            
            const n = document.getElementById('n');
            n.innerText = "Кролик доволен! ✅";
            n.style.display = "block";
            setTimeout(() => { n.style.display = "none"; busy = false; b.innerHTML = '<i class="fas fa-carrot"></i> Покормить (+7 дней)'; }, 2000);
        }

        if (tg) { tg.ready(); tg.expand(); }
        load();
    </script>
</body>
</html>
